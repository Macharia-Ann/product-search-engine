<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Search Engine</title>
    <link rel="stylesheet" href="styles.css">
    <!-- font awesome link for icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <section class="container">
        <form>
            <i class="fas fa-search"></i>
            <input type="text" id="search-item" placeholder="search products">
        </form>
        <div class="product-list">
            <div class="results">The product you searched for does not exist!</div>
            <div class="product">
                <img src="images/black.webp">
                <div class="p-details">
                    <h2>A black T-shirt</h2>
                    <h3>150/-</h3>
                </div>
            </div>
            <div class="product">
                <img src="images/white.jpg">
                <div class="p-details">
                    <h2>A white T-shirt</h2>
                    <h3>200/-</h3>
                </div>
            </div>
            <div class="product">
                <img src="images/pink.webp">
                <div class="p-details">
                    <h2>A pink T-shirt</h2>
                    <h3>350/-</h3>
                </div>
            </div>
            <div class="product">
                <img src="images/light-blue.webp">
                <div class="p-details">
                    <h2>A light blue T-shirt</h2>
                    <h3>250/-</h3>
                </div>
            </div>
            <div class="product">
                <img src="images/grey.webp">
                <div class="p-details">
                    <h2>A grey T-shirt</h2>
                    <h3>150/-</h3>
                </div>
            </div>
            <div class="product">
                <img src="images/black2.webp">
                <div class="p-details">
                    <h2>A styled black T-shirt</h2>
                    <h3>450/-</h3>
                </div>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
